<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우리 메모장 💌</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Serif+KR:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #fdf6ee;
    --warm: #f5e6d3;
    --blush: #e8c4a2;
    --rust: #c47a4a;
    --deep: #5c3d2e;
    --text: #3a2618;
    --muted: #9e7b65;
    --check: #b85c38;
    --shadow: rgba(92,61,46,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    font-family: 'Gowun Dodum', sans-serif;
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 80px;
    background-image: 
      radial-gradient(ellipse at 20% 10%, #fde8d4 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, #f0d9c4 0%, transparent 50%);
  }

  header {
    text-align: center;
    padding: 40px 20px 20px;
  }

  .heart-deco {
    font-size: 13px;
    color: var(--blush);
    letter-spacing: 8px;
    display: block;
    margin-bottom: 8px;
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }

  h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(24px, 6vw, 34px);
    color: var(--deep);
    font-weight: 600;
    letter-spacing: -0.5px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 13px;
    margin-top: 6px;
    letter-spacing: 1px;
  }

  .divider {
    width: 60px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--blush), transparent);
    margin: 16px auto;
  }

  .sync-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 18px;
  }

  .sync-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #ccc;
    transition: background 0.3s;
    flex-shrink: 0;
  }

  .sync-dot.connected { background: #7bc67e; animation: blink 2s ease-in-out infinite; }
  .sync-dot.connecting { background: #f0b96b; animation: blink 0.8s ease-in-out infinite; }
  .sync-dot.error { background: #e07070; }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 0 16px;
  }

  .loading-screen {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 14px;
  }

  .loading-spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--warm);
    border-top-color: var(--rust);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .category-card {
    background: white;
    border-radius: 20px;
    margin-bottom: 16px;
    overflow: hidden;
    box-shadow: 0 4px 20px var(--shadow), 0 1px 4px rgba(0,0,0,0.04);
    transition: transform 0.2s ease;
  }

  .category-card:active { transform: scale(0.99); }

  .category-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 20px 14px;
    cursor: pointer;
    user-select: none;
  }

  .category-title-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .category-emoji {
    font-size: 22px;
    width: 40px;
    height: 40px;
    background: var(--warm);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .category-name {
    font-family: 'Noto Serif KR', serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--deep);
  }

  .category-count {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }

  .toggle-icon {
    color: var(--muted);
    font-size: 18px;
    transition: transform 0.3s ease;
    flex-shrink: 0;
  }

  .category-card.collapsed .toggle-icon { transform: rotate(-90deg); }
  .category-card.collapsed .items-list { display: none; }

  .items-list { padding: 0 20px 4px; }

  .item-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--warm);
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .item-row:last-of-type { border-bottom: none; }

  .custom-checkbox {
    width: 22px;
    height: 22px;
    border-radius: 7px;
    border: 2px solid var(--blush);
    background: white;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    position: relative;
  }

  .custom-checkbox.checked {
    background: var(--check);
    border-color: var(--check);
  }

  .custom-checkbox.checked::after {
    content: '';
    width: 6px;
    height: 10px;
    border: 2px solid white;
    border-top: none;
    border-left: none;
    transform: rotate(45deg) translateY(-1px);
  }

  .item-text {
    flex: 1;
    font-size: 15px;
    color: var(--text);
    line-height: 1.4;
    transition: all 0.2s ease;
    word-break: break-all;
    cursor: text;
    padding: 2px 0;
    min-height: 26px;
    border-bottom: 1px dashed transparent;
  }

  .item-text:focus {
    outline: none;
    border-bottom-color: var(--blush);
  }

  .item-text.done {
    text-decoration: line-through;
    color: var(--muted);
    opacity: 0.6;
  }

  .delete-btn {
    background: none;
    border: none;
    color: var(--blush);
    font-size: 20px;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 6px;
    opacity: 0;
    transition: opacity 0.2s;
    flex-shrink: 0;
    line-height: 1;
  }

  .item-row:hover .delete-btn { opacity: 1; }

  @media (hover: none) {
    .delete-btn { opacity: 0.4; }
  }

  .add-item-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 0 16px;
  }

  .add-input {
    flex: 1;
    border: none;
    border-bottom: 1.5px dashed var(--blush);
    background: transparent;
    font-family: 'Gowun Dodum', sans-serif;
    font-size: 14px;
    color: var(--text);
    padding: 4px 2px;
    outline: none;
  }

  .add-input::placeholder { color: var(--blush); }

  .add-btn {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: var(--rust);
    border: none;
    color: white;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s ease, background 0.15s;
    line-height: 1;
    padding-bottom: 1px;
  }

  .add-btn:hover { background: var(--deep); transform: scale(1.08); }

  .add-category-btn {
    width: 100%;
    padding: 16px;
    background: transparent;
    border: 2px dashed var(--blush);
    border-radius: 20px;
    color: var(--muted);
    font-family: 'Gowun Dodum', sans-serif;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.2s ease;
    margin-top: 4px;
  }

  .add-category-btn:hover {
    background: white;
    color: var(--rust);
    border-color: var(--rust);
  }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(60,30,10,0.35);
    backdrop-filter: blur(4px);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: white;
    border-radius: 24px;
    padding: 28px 24px;
    width: 100%;
    max-width: 340px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    animation: modalIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }

  @keyframes modalIn {
    from { transform: scale(0.85) translateY(20px); opacity: 0; }
    to { transform: scale(1) translateY(0); opacity: 1; }
  }

  .modal h3 {
    font-family: 'Noto Serif KR', serif;
    font-size: 18px;
    color: var(--deep);
    margin-bottom: 20px;
    text-align: center;
  }

  .modal label {
    font-size: 12px;
    color: var(--muted);
    display: block;
    margin-bottom: 6px;
    margin-top: 14px;
  }

  .modal input[type="text"] {
    width: 100%;
    border: 1.5px solid var(--warm);
    border-radius: 10px;
    padding: 10px 14px;
    font-family: 'Gowun Dodum', sans-serif;
    font-size: 15px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  .modal input[type="text"]:focus { border-color: var(--blush); }

  .emoji-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 6px;
  }

  .emoji-option {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    background: var(--warm);
    border: 2px solid transparent;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15px;
  }

  .emoji-option.selected, .emoji-option:hover {
    border-color: var(--rust);
    background: white;
    transform: scale(1.1);
  }

  .modal-buttons {
    display: flex;
    gap: 10px;
    margin-top: 22px;
  }

  .btn-cancel {
    flex: 1;
    padding: 12px;
    border-radius: 12px;
    border: 1.5px solid var(--warm);
    background: white;
    font-family: 'Gowun Dodum', sans-serif;
    font-size: 14px;
    color: var(--muted);
    cursor: pointer;
  }

  .btn-confirm {
    flex: 2;
    padding: 12px;
    border-radius: 12px;
    border: none;
    background: var(--rust);
    font-family: 'Gowun Dodum', sans-serif;
    font-size: 14px;
    color: white;
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn-confirm:hover { background: var(--deep); }

  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--deep);
    color: white;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 200;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <span class="heart-deco">♡ ♡ ♡</span>
  <h1>우리 메모장</h1>
  <p class="subtitle">함께 쓰는 작은 공간</p>
  <div class="divider"></div>
</header>

<div class="container">
  <div class="sync-bar">
    <div class="sync-dot connecting" id="syncDot"></div>
    <span id="syncText">연결 중...</span>
  </div>
  <div id="mainContent">
    <div class="loading-screen">
      <div class="loading-spinner"></div>
      불러오는 중...
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>새 카테고리 만들기</h3>
    <label>카테고리 이름</label>
    <input type="text" id="newCatName" placeholder="예: 여행 계획" maxlength="20">
    <label>이모지 선택</label>
    <div class="emoji-grid" id="emojiGrid"></div>
    <div class="modal-buttons">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-confirm" onclick="addCategory()">추가하기</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set, push, update, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAD3k_pHxDed5ChFJ0Sxr3BwCs2Ae0bOa4",
  authDomain: "our-memo-fbb85.firebaseapp.com",
  databaseURL: "https://our-memo-fbb85-default-rtdb.firebaseio.com",
  projectId: "our-memo-fbb85",
  storageBucket: "our-memo-fbb85.firebasestorage.app",
  messagingSenderId: "294139692418",
  appId: "1:294139692418:web:8c2cfd968e4cf362ee3b9b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const notesRef = ref(db, 'notes');

const EMOJIS = ['🛒','💬','✅','🏠','🌿','🎉','💊','🐾','📚','✈️','🍳','💰','🎵','💝','🌸'];
let selectedEmoji = EMOJIS[0];

function setSyncStatus(status) {
  const dot = document.getElementById('syncDot');
  const text = document.getElementById('syncText');
  dot.className = 'sync-dot ' + status;
  if (status === 'connected') text.textContent = '실시간 동기화 중 ✓';
  else if (status === 'connecting') text.textContent = '연결 중...';
  else text.textContent = '연결 오류 — 인터넷을 확인해주세요';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

let firstLoad = true;

onValue(notesRef, (snapshot) => {
  setSyncStatus('connected');
  let data = snapshot.val();

  if (!data || !data.categories) {
    const initData = { categories: {} };
    const defaults = [
      { id: 'shopping', name: '장보기', emoji: '🛒' },
      { id: 'talk', name: '함께 이야기 해보자', emoji: '💬' },
      { id: 'todo', name: '해야 할 일', emoji: '✅' },
    ];
    defaults.forEach(c => { initData.categories[c.id] = { name: c.name, emoji: c.emoji, items: {} }; });
    set(notesRef, initData);
    return;
  }

  render(data);
  firstLoad = false;
}, (err) => {
  setSyncStatus('error');
});

function render(data) {
  const container = document.getElementById('mainContent');
  const cats = Object.entries(data.categories || {});

  let html = '<div id="categories">';
  cats.forEach(([catId, cat]) => {
    const items = Object.entries(cat.items || {});
    const doneCount = items.filter(([,v]) => v.done).length;
    html += `
      <div class="category-card" id="card-${catId}">
        <div class="category-header" onclick="window._toggle('${catId}')">
          <div class="category-title-wrap">
            <div class="category-emoji">${cat.emoji}</div>
            <div>
              <div class="category-name">${cat.name}</div>
              <div class="category-count">${items.length}개 항목${doneCount > 0 ? ` · ${doneCount}개 완료` : ''}</div>
            </div>
          </div>
          <div class="toggle-icon">▾</div>
        </div>
        <div class="items-list">
          ${items.map(([itemId, item]) => `
            <div class="item-row">
              <div class="custom-checkbox ${item.done ? 'checked' : ''}" onclick="window._check('${catId}','${itemId}',${!!item.done})"></div>
              <div class="item-text ${item.done ? 'done' : ''}" contenteditable="true"
                onblur="window._edit('${catId}','${itemId}',this.innerText)"
                onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}">${item.text}</div>
              <button class="delete-btn" onclick="window._del('${catId}','${itemId}')">×</button>
            </div>
          `).join('')}
          <div class="add-item-row">
            <input class="add-input" id="inp-${catId}" placeholder="항목 추가..." maxlength="60"
              onkeydown="if(event.key==='Enter') window._add('${catId}')">
            <button class="add-btn" onclick="window._add('${catId}')">+</button>
          </div>
        </div>
      </div>`;
  });
  html += '</div>';
  html += `<button class="add-category-btn" onclick="window._openModal()"><span style="font-size:18px">＋</span> 새 카테고리 추가</button>`;
  container.innerHTML = html;
}

window._toggle = (catId) => {
  const card = document.getElementById('card-' + catId);
  if (card) card.classList.toggle('collapsed');
};

window._check = (catId, itemId, done) => {
  update(ref(db, `notes/categories/${catId}/items/${itemId}`), { done: !done });
};

window._edit = (catId, itemId, text) => {
  const t = text.trim();
  if (t) update(ref(db, `notes/categories/${catId}/items/${itemId}`), { text: t });
};

window._del = (catId, itemId) => {
  remove(ref(db, `notes/categories/${catId}/items/${itemId}`));
  showToast('삭제됐어요');
};

window._add = (catId) => {
  const inp = document.getElementById('inp-' + catId);
  if (!inp) return;
  const text = inp.value.trim();
  if (!text) return;
  push(ref(db, `notes/categories/${catId}/items`), { text, done: false });
  inp.value = '';
  showToast('항목이 추가됐어요 ✓');
  setTimeout(() => { const el = document.getElementById('inp-' + catId); if (el) el.focus(); }, 150);
};

window._openModal = () => {
  selectedEmoji = EMOJIS[0];
  document.getElementById('emojiGrid').innerHTML = EMOJIS.map(e =>
    `<div class="emoji-option ${e === selectedEmoji ? 'selected' : ''}" onclick="window._emoji('${e}',this)">${e}</div>`
  ).join('');
  document.getElementById('newCatName').value = '';
  document.getElementById('modal').classList.add('open');
  setTimeout(() => document.getElementById('newCatName').focus(), 200);
};

window._emoji = (emoji, el) => {
  selectedEmoji = emoji;
  document.querySelectorAll('.emoji-option').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
};

window.closeModal = () => document.getElementById('modal').classList.remove('open');

window.addCategory = () => {
  const name = document.getElementById('newCatName').value.trim();
  if (!name) { document.getElementById('newCatName').focus(); return; }
  const catId = 'cat_' + Date.now();
  set(ref(db, `notes/categories/${catId}`), { name, emoji: selectedEmoji, items: {} });
  closeModal();
  showToast('새 카테고리가 추가됐어요 ✓');
};

document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>
</body>
</html>
